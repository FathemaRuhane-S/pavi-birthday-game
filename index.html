<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Pavi 🎂</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#ffd6ec,#ffe8cc);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    flex-direction:column;
}

h1{
    color:#ff1493;
    text-align:center;
    margin-bottom:10px;
}

#startScreen,
#winScreen{
    text-align:center;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:15px;
    background:#ff4fa3;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:15px;
}

#puzzle{
    width:300px;
    height:300px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    grid-template-rows:repeat(3,1fr);
    gap:2px;
    display:none;
}

.tile{
    width:100px;
    height:100px;
    background-image:url('cute.jpg');
    background-size:300px 300px;
    border-radius:8px;
    cursor:pointer;
}

.empty{
    background:none;
    background-color:white;
}

#funnyImage{
    width:300px;
    height:300px;
    border-radius:20px;
    display:none;
    object-fit:cover;
    box-shadow:0 0 20px rgba(0,0,0,0.3);

    margin:auto;
    
}

#birthdayText{
    display:none;
    font-size:35px;
    color:#ff1493;
    text-align:center;
    animation:pop 1s infinite alternate;
}

@keyframes pop{
    from{transform:scale(1);}
    to{transform:scale(1.1);}
}

.confetti{
    position:absolute;
    width:10px;
    height:10px;
    background:red;
    top:-10px;
    animation:fall linear forwards;
}

@keyframes fall{
    to{
        transform:translateY(100vh) rotate(720deg);
    }
}

.heart{
    position:absolute;
    bottom:-20px;
    font-size:20px;
    animation:floatUp linear forwards;
    opacity:0.8;
}

@keyframes floatUp{
    from{
        transform:translateY(0) scale(1);
        opacity:0.8;
    }

    to{
        transform:translateY(-110vh) scale(1.5);
        opacity:0;
    }
}

</style>
</head>

<body>

<div id="startScreen">
    <h1>Paiii ♡
... solve this  puzzle !
!
𐙚

</h1>
    <button onclick="startGame()">Start</button>
</div>

<div id="puzzle"></div>

<div id="winScreen">
    <h1 id="birthdayText">🎉 HAPPY BIRTHDAY PAVI 🎉   -`♡´-
</h1>
    <img id="funnyImage" src="funny.jpg">
</div>



<script>

const playMusic = new Audio("./play.mp3");
const winMusic = new Audio("./win.mp3");

playMusic.loop = true;


function launchHearts(){

    for(let i=0;i<25;i++){

        const heart=document.createElement("div");

        heart.classList.add("heart");

        heart.innerHTML="💖";

        heart.style.left=Math.random()*100+"vw";

        heart.style.animationDuration=
        (Math.random()*4+4)+"s";

        heart.style.fontSize=
        (Math.random()*20+20)+"px";

        document.body.appendChild(heart);

        setTimeout(()=>{
            heart.remove();
        },8000);
    }
}


const puzzle = document.getElementById("puzzle");

let selectedTile = null;

let tiles = [0,1,2,3,4,5,6,7,8];

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [array[i],array[j]]=[array[j],array[i]];
    }
}

shuffle(tiles);

function createPuzzle(){
    puzzle.innerHTML="";

    tiles.forEach((tile,index)=>{
        const div=document.createElement("div");

        div.classList.add("tile");

        let x=(tile%3)*100;
        let y=Math.floor(tile/3)*100;

        div.style.backgroundPosition=`-${x}px -${y}px`;

        div.addEventListener("click",()=>selectTile(index));

        puzzle.appendChild(div);
    });
}

function selectTile(index){

    if(selectedTile===null){
        selectedTile=index;
        puzzle.children[index].style.border="4px solid yellow";
    }
    else{

        [tiles[selectedTile],tiles[index]]=
        [tiles[index],tiles[selectedTile]];

        selectedTile=null;

        createPuzzle();

        checkWin();
    }
}

function checkWin(){

    const win=[0,1,2,3,4,5,6,7,8];

    if(JSON.stringify(tiles)===JSON.stringify(win)){

        setTimeout(()=>{

            document.getElementById("puzzle").style.display="none";

            document.getElementById("birthdayText").style.display="block";

            document.getElementById("funnyImage").style.display="block";

            document.getElementById("funnyImage").style.margin="auto";

            playMusic.pause();

            winMusic.currentTime = 0;
            winMusic.play();


            launchConfetti();
            launchHearts();

        },500);
    }
}

function launchConfetti(){

    for(let i=0;i<120;i++){

        const confetti=document.createElement("div");

        confetti.classList.add("confetti");

        confetti.style.left=Math.random()*100+"vw";

        confetti.style.animationDuration=
        (Math.random()*3+2)+"s";

        confetti.style.backgroundColor=
        `hsl(${Math.random()*360},100%,50%)`;

        document.body.appendChild(confetti);

        setTimeout(()=>{
            confetti.remove();
        },5000);
    }
}

function startGame(){
   
    document.getElementById("startScreen").style.display="none";

    puzzle.style.display="grid";
      
     playMusic.currentTime = 0;
     playMusic.play();

    createPuzzle();
}
</script>



</body>
</html>
